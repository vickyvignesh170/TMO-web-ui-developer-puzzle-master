<ng-container *ngIf="(readingList$ | async).length > 0; else empty">
  <div class="reading-list-item" *ngFor="let b of readingList$ | async; trackBy: trackByFn">
    <div>
      <img class="reading-list-item--cover" [src]="b.coverUrl" />
    </div>
    <div class="reading-list-item--details">
      <strong class="reading-list-item--details--title">{{ b.title }}</strong>
      <div class="reading-list-item--details--author">
        {{ b.authors?.join(',') }}
      </div>
    </div>
    <div class="reading-list-item--actions">
      <button
        mat-icon-button
        [matTooltip]="b.finished ? 'Finished': 'Mark as Finished'"
        [attr.aria-label]="'Mark ' + b.title + ' as finished'"
        (click)="markAsFinished(b)"
      >
       <mat-icon [ngClass]="b.finished ? 'read': 'unread'">check_circle</mat-icon>
      </button>

      <button
        mat-icon-button
        color="warn"
        matTooltip="Remove from reading list"
        [attr.aria-label]="'Remove ' + b.title + ' from reading list'"
        (click)="removeFromReadingList(b)"
      >
        <mat-icon>remove_circle</mat-icon>
      </button>
    </div>
  </div>
</ng-container>
<ng-template #empty>
  <p class="empty">You haven't added any books to your reading list yet.</p>
</ng-template>
